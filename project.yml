name: SoundManager
options:
  bundleIdPrefix: io.github.uta-a
  deploymentTarget:
    macOS: "14.4"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: NO
    MACOSX_DEPLOYMENT_TARGET: "14.4"

targets:
  SoundManager:
    type: application
    platform: macOS
    sources:
      - path: SoundManager
    info:
      path: SoundManager/Info.generated.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: SoundManager
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSHumanReadableCopyright: "Copyright © 2026 uta-a. Released under the MIT License."
        NSSupportsAutomaticTermination: true
        NSSupportsSuddenTermination: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.uta-a.SoundManager
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: SoundManager/Info.generated.plist
        MACOSX_DEPLOYMENT_TARGET: "14.4"
        SWIFT_OBJC_BRIDGING_HEADER: SoundManager/SoundManager-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/Shared

  SoundManagerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SoundManagerTests
    dependencies:
      - target: SoundManager
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.uta-a.SoundManagerTests
        GENERATE_INFOPLIST_FILE: YES
        MACOSX_DEPLOYMENT_TARGET: "14.4"

schemes:
  SoundManager:
    build:
      targets:
        SoundManager: all
        SoundManagerTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - SoundManagerTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
