name: SoundManager
options:
  bundleIdPrefix: io.github.uta-a
  deploymentTarget:
    macOS: "14.4"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"   # ad-hoc 署名 (配布対象外のため)
    ENABLE_HARDENED_RUNTIME: NO
    MACOSX_DEPLOYMENT_TARGET: "14.4"

targets:
  SoundManager:
    type: application
    platform: macOS
    sources:
      - path: SoundManager
    info:
      path: SoundManager/Info.generated.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: SoundManager
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSHumanReadableCopyright: "Copyright © 2026 uta-a. Released under the MIT License."
        NSSupportsAutomaticTermination: true
        NSSupportsSuddenTermination: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.uta-a.SoundManager
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: SoundManager/Info.generated.plist
        MACOSX_DEPLOYMENT_TARGET: "14.4"
